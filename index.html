<!doctype html>
<html class="transition-colors duration-300 ease-in-out" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordly</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="body bg-page-bg dark:bg-page-bg-dark">
    <header class="relative header flex">
      <div
        class="flex flex-col pt-5 w-full gap-3 items-center font-header text-header-text dark:text-header-text-dark"
      >
        <h1 class="text-5xl"><i class="bi bi-book"></i>Wordly</h1>
        <p>We put the diction in dictionary</p>
      </div>

      <div
        class="theme-toggle absolute right-0 flex gap-1 md:gap-3 my-2 mx-3 md:my-5 md:mx-8 items-center justif"
      >
        <p
          class="text-header-text dark:text-header-text-dark text-md font-medium sm:text-2xl"
        >
          Dark
        </p>
        <label
          class="relative inline-flex items-center cursor-pointer select-none"
        >
          <input type="checkbox" id="theme-toggle" class="sr-only peer" />

          <div
            class="w-10 h-4.5 sm:w-14 sm:h-8 rounded-full peer border-2 border-border dark:border-border-dark peer-checked:after:translate-x-5 sm:peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-05 sm:after:top-1 after:left-1 dark:after:bg-border-dark after:bg-border after:rounded-full after:h-3 after:w-3 sm:after:h-6 sm:after:w-6 after:transition-all"
          ></div>
        </label>
      </div>
    </header>

    <main class="my-8">
      <div class="search-section w-full flex justify-center">
        <div
          class="form-area px-4 py-2 bg-secondary-bg border-2 border-border rounded-full shadow-md/20 font-search dark:bg-secondary-bg-dark dark:border-border-dark dark:text-text-dark"
        >
          <form class="search-form flex gap-1" action="">
            <input
              class="focus:outline-none w-80"
              type="text"
              name="word"
              autocomplete="off"
              placeholder="Search for a word..."
            />
            <button
              class="text-2xl text-border hover:text-header-text dark:text-border-dark"
            >
              <i class="bi bi-search"></i>
            </button>
          </form>
        </div>
      </div>

      <div class="result-section w-full flex justify-center mt-8">
        <div
          class="result-area flex flex-col gap-5 px-6 py-6 bg-secondary-bg border-2 border-border rounded-lg w-full max-w-1/2 min-w-96 dark:bg-secondary-bg-dark dark:border-border-dark dark:text-text-dark"
        ></div>
      </div>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
